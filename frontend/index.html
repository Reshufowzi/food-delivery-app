
<!DOCTYPE html>
<html>
<head>
    <title>Food Delivery App</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            padding: 20px;
        }
        .container {
            width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: orange;
            border: none;
            color: white;
            font-size: 16px;
        }
        .food-card {
            background: #fff3e0;
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Food Delivery App</h1>

    <h2>Register</h2>

    <input type="text" id="name" placeholder="Enter Name">
    <input type="email" id="email" placeholder="Enter Email">
    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="register()">Register</button>

    <h2>Login</h2>

    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">

    <button onclick="login()">Login</button>

    <div id="foods" style="display:none;">
        <h2>Food Items</h2>

        <div class="food-card">
            <h3>Pizza</h3>
            <p>₹299</p>
        </div>

        <div class="food-card">
            <h3>Burger</h3>
            <p>₹199</p>
        </div>

        <div class="food-card">
            <h3>Biryani</h3>
            <p>₹249</p>
        </div>
    </div>
</div>

<script>
async function register() {

    const response = await fetch('http://3.108.235.192:5000/register', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        })
    });

    const data = await response.json();
    alert(data.message);
}

async function login() {

    const response = await fetch('http://3.108.235.192:5000/login', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            email: document.getElementById('loginEmail').value,
            password: document.getElementById('loginPassword').value
        })
    });

    const data = await response.json();

    if(data.success){
        alert("Login Successful");
        document.getElementById('foods').style.display = 'block';
    } else {
        alert("Invalid Credentials");
    }
}
</script>

</body>
</html>
